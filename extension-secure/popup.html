<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f9fa;
    }
    .header {
      background: #60a917;
      color: #fff;
      padding: 14px 16px;
      font-weight: 600;
      font-size: 14px;
    }
    .body { padding: 16px; }
    .step { display: none; }
    .step.active { display: block; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }
    input[type="email"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
      transition: border .2s;
    }
    input:focus { border-color: #60a917; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #60a917; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #4e8e12; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .mt-2 { margin-top: 12px; }
    .status {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 8px;
    }
    .status.error { color: #e74c3c; }
    .status.success { color: #60a917; }
    .info {
      background: #eaf7e1;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #2e7d32;
      margin-bottom: 12px;
      text-align: center;
    }
    .info .email { font-weight: 700; }
    .token-info {
      font-size: 10px;
      color: #999;
      text-align: center;
      word-break: break-all;
      margin-top: 4px;
    }
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">🔐 Branch Lookup — Login</div>
  <div class="body">

    <!-- Step 1: Email -->
    <div class="step active" id="step-email">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="user@kantor.com" autocomplete="email">
      <div class="status" id="status-email"></div>
      <button class="btn btn-primary mt-2" id="btn-send">Kirim OTP</button>
    </div>

    <!-- Step 2: OTP -->
    <div class="step" id="step-otp">
      <div class="info">
        Kode OTP dikirim ke <span class="email" id="display-email"></span>
      </div>
      <label for="otp">Kode OTP</label>
      <input type="text" id="otp" placeholder="123456" inputmode="numeric" maxlength="6">
      <div class="status" id="status-otp"></div>
      <button class="btn btn-primary mt-2" id="btn-verify">Verifikasi</button>
      <button class="btn mt-2" id="btn-back" style="background:transparent;color:#888;font-weight:400;font-size:12px;">← Ganti email</button>
    </div>

    <!-- Step 3: Connected -->
    <div class="step" id="step-connected">
      <div class="info">✅ Terhubung sebagai <span class="email" id="display-email2"></span></div>
      <!-- token-info hidden -->
      <button class="btn btn-danger mt-2" id="btn-logout">Putuskan</button>
    </div>

  </div>
  <div class="footer">v2.0</div>
  <script src="popup.js"></script>
</body>
</html>
